name: stock updater

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: run core engine
        env:
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: node fetch-data.js

      - name: commit data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stock-data.json
          # only create a commit if data actually changed to prevent empty log spam
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: hourly metrics"
          git push
